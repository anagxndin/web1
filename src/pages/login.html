<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../styles/estilos.css">
    <script src="https://kit.fontawesome.com/aca5240e3d.js" crossorigin="anonymous"></script>
    <script src="../scripts/scripts.js"></script>
</head>
<body>
    <header class="mainHeader">
      <button id="dropdownToggle"><i class="fa-solid fa-bars" id="menuIcon"></i></button>
      <div id="logo">
        <h1><i>veloCity</i></h1>
      </div>
      <nav class="dropdownMenu" id="dropdownMenu">
        <a href="index.html" class="dropdownItem">Home</a>
        <a href="login.html" class="dropdownItem">Login</a>
        <a href="cadastro.html" class="dropdownItem">Cadastro</a>
        <a href="criarAnuncio.html" class="dropdownItem">Criar Anúncio</a>
        <a href="listagemAnuncios.html" class="dropdownItem">Listagem de Anúncios</a>
        <a href="interesse.html" class="dropdownItem">Listagem de Interesses</a>
        <a href="detalhesAnuncios.html" class="dropdownItem">Detalhes do Anúncio</a>
        <a href="principalRestrita.html" class="dropdownItem">Principal Restrita</a>
      </nav>
    </header>

    <div class="loginContainer">
        <div class="loginForm">
            <div class="loginHeader">
                <i class="fa-solid fa-lock-open loginIcon"></i>
                <h2>Login</h2>
            </div>
            <p class="loginSubtitle">Acesse sua conta para gerenciar seus anúncios</p>
            
            <form id="formLogin" novalidate>
                <div class="formGroup">
                    <label for="loginEmail">
                        <i class="fa-solid fa-envelope"></i> E-mail
                    </label>
                    <input 
                        type="email" 
                        id="loginEmail" 
                        name="email" 
                        placeholder="seu.email@exemplo.com" 
                        required
                    >
                    <span class="errorMessage" id="erroLoginEmail"></span>
                </div>

                <div class="formGroup">
                    <label for="loginSenha">
                        <i class="fa-solid fa-lock"></i> Senha
                    </label>
                    <input 
                        type="password" 
                        id="loginSenha" 
                        name="senha" 
                        placeholder="Digite sua senha" 
                        required
                    >
                    <span class="errorMessage" id="erroLoginSenha"></span>
                </div>

                <div class="rememberMe">
                    <input type="checkbox" id="lembrarMe" name="lembrarMe">
                    <label for="lembrarMe">Lembrar-me neste computador</label>
                </div>

                <button type="submit" class="btnLogin">
                    <i class="fa-solid fa-sign-in-alt"></i> Entrar
                </button>
            </form>

            <div class="loginLinks">
                <a href="#" class="linkEsqueceuSenha">Esqueceu sua senha?</a>
            </div>

            <div class="loginDivider"></div>

            <p class="loginCadastro">
                Não possui conta? <a href="cadastro.html">Cadastre-se aqui</a>
            </p>
        </div>
    </div>
</body>
</html>
