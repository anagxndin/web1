<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../styles/estilos.css">
    <script src="https://kit.fontawesome.com/aca5240e3d.js" crossorigin="anonymous"></script>
    <script src="../scripts/scripts.js"></script>
</head>
<body>
    <header class="mainHeader">
      <button id="dropdownToggle"><i class="fa-solid fa-bars" id="menuIcon"></i></button>
      <div id="logo">
        <h1><i>veloCity</i></h1>
      </div>
      <nav class="dropdownMenu" id="dropdownMenu">
        <a href="index.html" class="dropdownItem">Home</a>
        <a href="login.html" class="dropdownItem">Login</a>
        <a href="cadastro.html" class="dropdownItem">Cadastro</a>
        <a href="criarAnuncio.html" class="dropdownItem">Criar Anúncio</a>
        <a href="listagemAnuncios.html" class="dropdownItem">Listagem de Anúncios</a>
        <a href="interesse.html" class="dropdownItem">Listagem de Interesses</a>
        <a href="detalhesAnuncios.html" class="dropdownItem">Detalhes do Anúncio</a>
        <a href="principalRestrita.html" class="dropdownItem">Principal Restrita</a>
      </nav>
    </header>

    <div class="cadastroContainer">
        <div class="cadastroForm">
            <h2>Cadastro de Usuário</h2>
            <p class="cadastroSubtitle">Crie sua conta para anunciar seus veículos</p>
            
            <form id="formCadastro">
                <div class="formGroup">
                    <label for="nome">
                        <i class="fa-solid fa-user"></i> Nome Completo
                    </label>
                    <input 
                        type="text" 
                        id="nome" 
                        name="nome" 
                        placeholder="Digite seu nome completo"
                    >
                </div>

                <div class="formGroup">
                    <label for="cpf">
                        <i class="fa-solid fa-id-card"></i> CPF
                    </label>
                    <input 
                        type="text" 
                        id="cpf" 
                        name="cpf" 
                        placeholder="000.000.000-00"
                    >
                </div>

                <div class="formGroup">
                    <label for="email">
                        <i class="fa-solid fa-envelope"></i> E-mail
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="seu.email@exemplo.com"
                    >
                </div>

                <div class="formGroup">
                    <label for="telefone">
                        <i class="fa-solid fa-phone"></i> Telefone
                    </label>
                    <input 
                        type="tel" 
                        id="telefone" 
                        name="telefone" 
                        placeholder="(11) 99999-9999"
                    >
                </div>

                <div class="formGroup">
                    <label for="senha">
                        <i class="fa-solid fa-lock"></i> Senha
                    </label>
                    <input 
                        type="password" 
                        id="senha" 
                        name="senha" 
                        placeholder="Digite uma senha forte"
                    >
                </div>

                <div class="formGroup">
                    <label for="confirmarSenha">
                        <i class="fa-solid fa-lock"></i> Confirmar Senha
                    </label>
                    <input 
                        type="password" 
                        id="confirmarSenha" 
                        name="confirmarSenha" 
                        placeholder="Confirme sua senha"
                    >
                </div>

                <button type="submit" class="btnCadastro">
                    <i class="fa-solid fa-user-plus"></i> Cadastrar
                </button>
            </form>

            <p class="cadastroLink">
                Já possui conta? <a href="login.html">Faça login aqui</a>
            </p>
        </div>
    </div>
</body>
</html>
