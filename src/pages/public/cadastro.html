<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — veloCity</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../../styles/design.css" />
  <script src="../../scripts/scripts.js" defer></script>
  <script src="../../scripts/forms.js" defer></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

  <header class="navbar">
    <div class="navbar__inner">
      <button class="navbar__toggle" id="dropdownToggle" aria-label="Menu">
        <i class="bi bi-list"></i>
      </button>

      <a href="index.html" class="navbar__brand"><em>veloCity</em></a>

      <nav class="navbar__links" id="dropdownMenu">
        <a href="index.html" class="navbar__link">Home</a>
        <a href="../area-restrita/criar-anuncio.html" class="navbar__link">Anunciar</a>
        <a href="../area-restrita/meus-anuncios.html" class="navbar__link">Meus Anúncios</a>
        <a href="../area-restrita/principalRestrita.html" class="navbar__link">Painel</a>
        <span id="navAuth"><a href="login.html" class="navbar__cta">Entrar</a></span>
      </nav>
    </div>
  </header>

  <main class="page" id="main-content">
    <div class="auth">
      <div class="auth__card">
        <div class="auth__header">
          <div class="heading-2">Criar Conta</div>
          <p>Cadastre-se para anunciar seus veículos</p>
        </div>

        <div id="formAlert" class="alert alert--hidden" role="alert"></div>

        <form id="formCadastro" class="auth__form" action="../../../backend/api/cadastro.php" method="post">
          <div class="form-group">
            <label for="nome" class="form-label">
              <i class="bi bi-person"></i> Nome Completo
            </label>
            <input type="text" id="nome" name="nome" class="form-input" placeholder="Digite seu nome completo" required>
          </div>

          <div class="form-group">
            <label for="cpf" class="form-label">
              <i class="bi bi-person-vcard"></i> CPF
            </label>
            <input type="text" id="cpf" name="cpf" class="form-input" placeholder="000.000.000-00" maxlength="14" required>
          </div>

          <div class="form-group">
            <label for="email" class="form-label">
              <i class="bi bi-envelope"></i> E-mail
            </label>
            <input type="email" id="email" name="email" class="form-input" placeholder="seu.email@exemplo.com" required>
          </div>

          <div class="form-group">
            <label for="telefone" class="form-label">
              <i class="bi bi-telephone"></i> Telefone
            </label>
            <input type="tel" id="telefone" name="telefone" class="form-input" placeholder="(11) 99999-9999" required>
          </div>

          <div class="form-group">
            <label for="senha" class="form-label">
              <i class="bi bi-lock"></i> Senha
            </label>
            <input type="password" id="senha" name="senha" class="form-input" placeholder="Mínimo 8 caracteres" minlength="8" required>
          </div>

          <button type="submit" class="btn btn--primary btn--full">
            <i class="bi bi-person-plus"></i> Cadastrar
          </button>
        </form>

        <div class="auth__footer">
          Já possui conta? <a href="login.html">Faça login aqui</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    &copy; 2026 veloCity — Todos os direitos reservados.
  </footer>
</body>
</html>
