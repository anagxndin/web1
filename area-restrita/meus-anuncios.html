<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Anúncios - veloCity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Cabeçalho -->
    <header class="bg-velocity-header p-3 text-center">
        <h2 class="logo-text">velo<span class="logo-accent">City</span></h2>
    </header>

    <!-- Barra de Navegação -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-velocity-nav">
        <div class="container">
            <a class="navbar-brand logo-text" href="meus-anuncios.html">Painel</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="criar-anuncio.html">Novo Anúncio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="meus-anuncios.html">Meus Anúncios</a></li>
                </ul>
                <button class="btn btn-outline-light btn-sm">Sair / Logoff</button>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <main class="container my-5 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 style="color: var(--azul-escuro);">Meus Anúncios</h3>
            <a href="criar-anuncio.html" class="btn btn-velocity-primary"> + Criar Novo Anúncio</a>
        </div>

        <div class="row">
            <!-- Card de Veículo 1 -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm h-100 border-0">
                    <img src="https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?auto=format&fit=crop&q=80&w=400&h=250" class="card-img-top" alt="Foto do veículo" style="object-fit: cover; height: 200px;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold" style="color: var(--azul-escuro);">Volkswagen Polo</h5>
                        <p class="card-text text-muted mb-1">Ano: 2022</p>
                        <p class="card-text text-velocity-accent fs-5 mb-3">R$ 75.000,00</p>
                        
                        <div class="mt-auto d-flex flex-column gap-2">
                            <a href="detalhes.html" class="btn btn-sm btn-velocity-secondary">Visualizar Detalhes</a>
                            <a href="interesses.html" class="btn btn-sm btn-outline-secondary">Ver Interesses</a>
                            <button class="btn btn-sm btn-outline-danger" onclick="alert('A exclusão será feita no Back-end')">Excluir Anúncio</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card de Veículo 2 -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm h-100 border-0">
                    <img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?auto=format&fit=crop&q=80&w=400&h=250" class="card-img-top" alt="Foto do veículo" style="object-fit: cover; height: 200px;">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold" style="color: var(--azul-escuro);">Fiat Argo</h5>
                        <p class="card-text text-muted mb-1">Ano: 2021</p>
                        <p class="card-text text-velocity-accent fs-5 mb-3">R$ 62.000,00</p>
                        
                        <div class="mt-auto d-flex flex-column gap-2">
                            <a href="detalhes.html" class="btn btn-sm btn-velocity-secondary">Visualizar Detalhes</a>
                            <a href="interesses.html" class="btn btn-sm btn-outline-secondary">Ver Interesses</a>
                            <button class="btn btn-sm btn-outline-danger" onclick="alert('A exclusão será feita no Back-end')">Excluir Anúncio</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Rodapé -->
    <footer class="bg-velocity-footer text-white text-center p-3 mt-auto">
        &copy; 2026 veloCity - Todos os direitos reservados.
    </footer>
</body>
</html>
