<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

                    <li class="nav-item"><a class="nav-link" href="criar-anuncio.html">Novo Anúncio</a></li>

                        <p class="card-text text-muted mb-1">Ano: 2022</p>
                        <p class="card-text text-primary fw-bold mb-3">R$ 75.000,00</p>

                        <h5 class="card-title">Fiat Argo</h5>
                        <p class="card-text text-muted mb-1">Ano: 2021</p>
                        <p class="card-text text-primary fw-bold mb-3">R$ 62.000,00</p>
